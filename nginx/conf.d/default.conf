server {
    listen 443 ssl;
    listen [::]:443;
    http2 on;

    server_name ws.avocado-messenger.host;

    ssl_certificate     /etc/certificates/live/avocado-messenger.host/fullchain.pem;
    ssl_certificate_key /etc/certificates/live/avocado-messenger.host/privkey.pem;

    server_tokens off;

    # Limit connection Websocket
    limit_conn conn_limit 10;

    # Heading
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.avocado-messenger.host; style-src 'self' https://static.avocado-messenger.host; img-src 'self' data: https://media.avocado-messenger.host https://static.avocado-messenger.host; connect-src 'self' wss://ws.avocado-messenger.host; frame-ancestors 'none';" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

    # Includes
    include /etc/nginx/snippets/security-headers.conf;

    location /ws/ {
        proxy_http_version 1.1;
        proxy_read_timeout 86400s;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass https://websocket;
    }
}



server {
    listen 443 ssl;
    listen [::]:443;
    http2 on;

    server_name static.avocado-messenger.host;

    ssl_certificate     /etc/certificates/live/avocado-messenger.host/fullchain.pem;
    ssl_certificate_key /etc/certificates/live/avocado-messenger.host/privkey.pem;

    server_tokens off;

    limit_req  zone=general_limit burst=100 nodelay;
    limit_conn conn_limit 20;

    # Heading
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.avocado-messenger.host; style-src 'self' https://static.avocado-messenger.host; img-src 'self' data: https://media.avocado-messenger.host https://static.avocado-messenger.host; connect-src 'self' wss://ws.avocado-messenger.host; frame-ancestors 'none';" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;

    # Includes
    include /etc/nginx/snippets/security-headers.conf;

    location / {
        alias /var/www/html/static/;
    }
}

