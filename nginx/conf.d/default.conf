server {
    listen       443 ssl http2;
    listen  [::]:443;
    server_name ws.avocado-messenger.host;

    location /ws/ {
        proxy_pass https://websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Roreal-IP $remote_addr;
        proxy_set_header X-Fwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $server_name;
    }
}


server {
    listen       443 ssl;
    listen  [::]:443;
    server_name  static.avocado-messenger.host;

    location / {
        alias /var/www/html/static/;
        add_header Access-Control-Allow-Origin *;
    }
}

server {
    listen       443 ssl;
    listen  [::]:443;
    server_name  media.avocado-messenger.host;

    location / {
        alias /var/www/html/media/;
        add_header Access-Control-Allow-Origin *;
    }
}
