upstream app {
    server web:443;
}

#upstream bot {
#    server bot:8080;
#}

upstream websocket {
    server daphne:8443;
}

server {
    listen 80;
    server_name avocado-messenger.host *.avocado-messenger.host;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    if ($http_x_forwarded_proto = 'http') {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    listen 443 ssl;
    listen [::]:443;
    http2 on;

    server_name www.avocado-messenger.host;

    ssl_certificate     /etc/certificates/live/avocado-messenger.host/fullchain.pem;
    ssl_certificate_key /etc/certificates/live/avocado-messenger.host/privkey.pem;

    return 301 https://staging.avocado-messenger.host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443;
    http2 on;

    server_name staging.avocado-messenger.host;

    ssl_certificate     /etc/certificates/live/avocado-messenger.host/fullchain.pem;
    ssl_certificate_key /etc/certificates/live/avocado-messenger.host/privkey.pem;

    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Hide version
    server_tokens off;

    # Anti-DDoS
    limit_req             zone=general_limit burst=20 nodelay;
    limit_conn            conn_limit 20;
    limit_req_status      429;
    limit_conn_status     429;

    # Timeout
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    if ($scheme = 'http') {
        return 301 https://$host$request_uri;
    }

    location /admin/ {
        client_max_body_size 100M;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.avocado-messenger.host; style-src 'self' 'unsafe-inline' https://static.avocado-messenger.host; img-src 'self' data: https://media.avocado-messenger.host https://static.avocado-messenger.host; connect-src 'self' wss://ws.avocado-messenger.host; frame-ancestors 'none';" always;
        include /etc/nginx/snippets/security-headers.conf;

        proxy_pass https://app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    location / {
        client_max_body_size 100M;

        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://ws.avocado-messenger.host; frame-ancestors 'none';" always;
        include /etc/nginx/snippets/security-headers.conf;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_pass https://app;
    }

    error_page 404 /404.html;
    location = /404.html {
        root /etc/nginx/html;
        allow all;
    }

    error_page 403 /403.html;
    location = /403.html {
        root /etc/nginx/html;
        allow all;
    }

    error_page 429 /429.html;
    location = /429.html {
        root /etc/nginx/html;
        allow all;
    }

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443;
    http2 on;

    server_name api.avocado-messenger.host;

    ssl_certificate     /etc/certificates/live/avocado-messenger.host/fullchain.pem;
    ssl_certificate_key /etc/certificates/live/avocado-messenger.host/privkey.pem;

    # SSL настройки
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Hide version
    server_tokens off;

    # Heading
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.avocado-messenger.host; style-src 'self' 'unsafe-inline' https://static.avocado-messenger.host; img-src 'self' data: https://media.avocado-messenger.host https://static.avocado-messenger.host; connect-src 'self' wss://ws.avocado-messenger.host; frame-ancestors 'none';" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;

    # Anti-frame
    #add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none';"  always;

    # Includes
    include /etc/nginx/snippets/security-headers.conf;


    # Anti-DDoS
    limit_req             zone=api_limit burst=50 nodelay;
    limit_conn            conn_limit 30;
    limit_req_status      429;
    limit_conn_status     429;

    # Timeout
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    location / {
        client_max_body_size 100M;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
        proxy_pass https://app;
    }
}

