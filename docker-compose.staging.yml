name: messenger-backend

# 1. Шаблон сборки: единый контекст для всех Python-сервисов.
x-build: &python-build
  context: .
  dockerfile: Dockerfile

x-websocket: &websocket-build
  context: .
  dockerfile: Dockerfile_websocket

# 2. Шаблон ресурсов: защита от перегрузки CPU и утечек памяти (OOM).
x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 512M
      reservations:
        cpus: "0.10"
        memory: 128M

x-common-nginx: &common-nginx
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: 256M
      reservations:
        cpus: "0.05"
        memory: 64M


x-common-heavy: &common-heavy
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 1G
      reservations:
        cpus: "0.10"
        memory: 128M

services:
  postgres:
    container_name: postgres-backend
    image: postgres:18.1-bookworm
    <<: *common-heavy
    env_file:
      - service/.env.staging
    volumes:
      - postgres_volume:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER:-postgres}\" -d \"$${POSTGRES_DB:-postgres}\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - service

  redis:
    container_name: redis-backend
    image: redis/redis-stack-server:7.4.0-v8
    <<: *common
    env_file:
      - service/.env.staging
    volumes:
      - redis_server_volume:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - service

  rabbitmq:
    container_name: rabbitmq-backend
    image: rabbitmq:4.2-management-alpine
    <<: *common-heavy
    env_file:
      - service/.env.staging
    volumes:
      - rabbitmq_volume:/var/lib/rabbitmq/mnesia
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - service

  web:
    container_name: web-backend
    build: *python-build
    init: true
    stop_grace_period: 30s
    <<: *common
    env_file:
      - service/.env.staging
    volumes:
      - ./service:/service
      - ./certificates:/etc/certificates:ro
      - static_volume:/service/static
      - media_volume:/service/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "manage.py", "check", "--database", "default"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - service

  daphne:
    container_name: daphne
    build: *websocket-build
    entrypoint: sh entrypoint-websocket.sh
    stop_signal: SIGTERM
    init: true
    stop_grace_period: 60s
    volumes:
      - ./certificates:/etc/certificates:ro
    env_file:
      - service/.env.staging
    depends_on:
      web:
        condition: service_healthy
    networks:
      - service

  celery:
    container_name: celery-backend
    build: *python-build
    entrypoint: sh entrypoint-celery.sh
    stop_signal: SIGTERM
    init: true
    stop_grace_period: 60s
    <<: *common
    env_file:
      - service/.env.staging
    volumes:
      - ./certificates:/etc/certificates:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f \"celery.*worker\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - service

  celery-beat:
    container_name: celery-beat-backend
    build: *python-build
    env_file:
      - service/.env.staging
    entrypoint: sh entrypoint-celery-beat.sh
    init: true
    stop_grace_period: 30s
    <<: *common
    volumes:
      - ./certificates:/etc/certificates:ro
    depends_on:
      celery:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f \"celery.*beat\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - service

  bot:
    container_name: bot-backend
    build: *python-build
    entrypoint: python bot.py
    init: true
    stop_grace_period: 30s
    <<: *common
    env_file:
      - service/.env.staging
    volumes:
      - ./service:/service:ro
      - ./certificates:/etc/certificates:ro
    ports:
      - "8080:8080"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f \"python.*bot.py\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - service

  nginx:
    container_name: nginx-backend
    image: nginx:latest
    <<: *common-nginx
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d/:ro
      - ./certificates:/etc/certificates:ro
      - certbot_webroot:/var/www/certbot:ro
      - static_volume:/var/www/html/static:ro
      - media_volume:/var/www/html/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - service
  certbot:
    container_name: certbot
    image: certbot/dns-cloudflare:latest
    volumes:
      - ./certificates:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - service

volumes:
  static_volume:
  media_volume:
  postgres_volume:
  redis_server_volume:
  rabbitmq_volume:
  certbot_webroot:

networks:
  service:
    driver: bridge
